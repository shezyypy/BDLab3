{% extends "base.html" %}

{% block content %}
<div class="card">
    <html>
    <body>

    <h1>Срез по курсу</h1>

    <form method="get">
        <select name="course_id">
            {% for c in courses %}
            <option value="{{ c.id }}">{{ c.course_name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Показать</button>
    </form>

    <table>
    <tr>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Оценка</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row.student__first_name }}</td>
        <td>{{ row.student__last_name }}</td>
        <td>{{ row.grade }}</td>
    </tr>
    {% endfor %}

    </table>

    </body>
    </html>
    {% endblock %}
</div>
