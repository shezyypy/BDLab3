{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Срез по рейсу</h1>

    <form>
        <select name="flight">
            {% for f in flights %}
            <option value="{{ f.flight_number }}">{{ f.flight_number }}</option>
            {% endfor %}
        </select>
        <button type="submit">Показать</button>
    </form>

    <table>
    <tr>
        <th>Пассажир</th>
        <th>Место</th>
    </tr>

    {% for d in data %}
    <tr>
        <td>{{ d.last_name }}</td>
        <td>{{ d.seat }}</td>
    </tr>
    {% endfor %}
    </table>
    {% endblock %}
</div>
