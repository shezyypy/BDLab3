{% extends "base.html" %}

{% block content %}
<div class="card">
    <html>
    <body>

    <h1>Срез по пассажиру</h1>

    <form method="get">
        <select name="last_name">
            {% for p in passengers %}
            <option value="{{ p.last_name }}">
                {{ p.last_name }}
            </option>
            {% endfor %}
        </select>
        <button type="submit">Показать</button>
    </form>

    <table>
    <tr>
        <th>Рейс</th>
        <th>Место</th>
    </tr>

    {% for d in data %}
    <tr>
        <td>{{ d.flight.flight_number }}</td>
        <td>{{ d.seat }}</td>
    </tr>
    {% endfor %}

    </table>

    </body>
    </html>
    {% endblock %}
</div>
