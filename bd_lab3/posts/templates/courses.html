{% extends "base.html" %}
{% block content %}
<div class="card">
<h1>Курсы</h1>

<table>
<tr>
    <th>Название</th>
    <th>Кредиты</th>
    <th>Описание</th>
</tr>

{% for c in courses %}
<tr>
    <td>{{ c.course_name }}</td>
    <td>{{ c.credits }}</td>
    <td>{{ c.description }}</td>
</tr>
{% endfor %}

</table>
</div>

{% endblock %}
